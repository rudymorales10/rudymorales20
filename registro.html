  <div class="contenedor-formulario">
   <center><h2>Formulario de Cotización</h2></center> 
    
    <form action="https://formspree.io/f/xykojbwz" method="POST" class="mi-formulario">
      
      <label>Nombre del Cliente:</label>
      <input type="text" name="Nombre" placeholder="Tu nombre completo" required>

      <label>Número de Teléfono:</label>
      <input type="tel" name="Telefono" placeholder="Ej: 5555-4444" required>

      <label>Correo Electrónico:</label>
      <input type="email" name="Email" placeholder="correo@ejemplo.com" required>

      <label>Producto o servicio que necesitas:</label>
      <input type="text" name="Mensaje" placeholder="Ej: Una moto, repuestos, etc." required>

      <label>Tipo de Pago:</label>
      <select name="Metodo_de_Pago">
        <option value="contado">Efectivo / Contado</option>
        <option value="tarjeta">Tarjeta de Crédito</option>
        <option value="visacuotas">Visacuotas</option>
      </select>

      <button type="submit" class="btn-enviar">Enviar a Sonimotor GT</button>
      
    </form>
  </div>
