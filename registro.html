  <div class="contenedor-formulario">
    <h2>Formulario de Cotización</h2>
    <form class="mi-formulario">
      <label>Nombre del Cliente:</label>
      <input type="text" placeholder="Tu nombre completo" required>

      <label>Correo Electrónico:</label>
      <input type="email" placeholder="correo@ejemplo.com" required>

      <label>Producto de Interés:</label>
      <select required>
        <option value="">-- Seleccione un producto --</option>
        <option value="moto">Motocicleta Yamaha</option>
        <option value="repuesto">Repuestos Originales</option>
        <option value="instrumento">Instrumento Musical</option>
      </select>

      <label>Tipo de Pago:</label>
      <select>
        <option value="contado">Efectivo / Contado</option>
        <option value="tarjeta">Tarjeta de Crédito</option>
        <option value="visacuotas">Visacuotas</option>
      </select>

      <button type="submit" class="btn-enviar">Enviar a Sonimotor GT</button>
    </form>
  </div>
